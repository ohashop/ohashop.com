<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>OHAShop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="header"></div>

<div class="container mt-4">
  <div class="row">

    <div class="col-md-3" id="sidebar"></div>

    <div class="col-md-9">

      <div class="d-flex justify-content-between mb-3">
        <input id="searchInput" class="form-control w-50" placeholder="Search...">

        <div>
          <button class="btn btn-outline-success" onclick="setView('grid')"><i class="fa fa-th"></i></button>
          <button class="btn btn-outline-secondary" onclick="setView('list')"><i class="fa fa-list"></i></button>
        </div>
      </div>

      <div id="productContainer" class="row"></div>

    </div>

  </div>
</div>

<div id="footer"></div>

<script src="data/products.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
