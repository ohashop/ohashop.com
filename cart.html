<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Checkout - OHAShop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

  <h3>🛒 Checkout</h3>

  <!-- Cart Items -->
  <div id="cartItems" class="mb-3"></div>

  <!-- Location -->
  <select id="location" class="form-control mb-2">
    <option value="80">Dhaka (80৳)</option>
    <option value="130">Outside Dhaka (130৳)</option>
  </select>

  <!-- Summary -->
  <p>Subtotal: ৳<span id="subtotal">0</span></p>
  <p>Delivery: ৳<span id="delivery">0</span></p>
  <h4>Total: ৳<span id="total">0</span></h4>

  <hr>

  <!-- Customer Info -->
  <input id="name" class="form-control mb-2" placeholder="Name" required>
  <input id="phone" class="form-control mb-2" placeholder="Phone" required>
  <textarea id="address" class="form-control mb-2" placeholder="Address" required></textarea>

  <!-- Payment -->
  <div class="mb-3">
    <input type="radio" checked> Cash on Delivery
  </div>

  <button class="btn btn-success w-100" onclick="placeOrder()">Confirm Order</button>

</div>

<script src="assets/js/order.js"></script>
<script src="assets/js/cart.js"></script>

</body>
</html>
