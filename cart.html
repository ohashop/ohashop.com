<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <title>Cart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

  <h3>🛒 Your Cart</h3>

  <div id="cartItems"></div>

  <hr>

  <select id="location" class="form-control mb-2">
    <option value="80">Dhaka (80৳)</option>
    <option value="130">Outside Dhaka (130৳)</option>
  </select>

  <p>Subtotal: ৳<span id="subtotal"></span></p>
  <p>Delivery: ৳<span id="delivery"></span></p>
  <h4>Total: ৳<span id="total"></span></h4>

  <hr>

  <h4>Checkout</h4>

  <input id="name" class="form-control mb-2" placeholder="Name">
  <input id="phone" class="form-control mb-2" placeholder="Phone">
  <textarea id="address" class="form-control mb-2" placeholder="Address"></textarea>

  <button class="btn btn-success" onclick="placeOrder()">Place Order</button>

</div>

<script src="assets/js/cart.js"></script>

</body>
</html>
